<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Керування користувачами — Практична №5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            padding-top: 50px;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            margin-bottom: 30px;
            font-weight: bold;
        }
        .section-title {
            font-size: 0.9rem;
            color: #6c757d;
            margin-bottom: 15px;
        }
        .info-text {
            font-size: 0.85rem;
            color: #6c757d;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Керування користувачами</h2>

    <div class="mb-5">
        <div class="row g-2">
            <div class="col-md-6">
                <input type="text" id="userName" class="form-control" placeholder="Ім'я користувача">
            </div>
            <div class="col-md-6">
                <input type="text" id="userRole" class="form-control" placeholder="Роль (напр. Admin)">
            </div>
            <div class="col-12 mt-2">
                <button id="addBtn" class="btn btn-success w-25">Додати</button>
            </div>
        </div>
    </div>

    <hr>

    <div class="mt-4">
        <div class="row g-2">
            <div class="col-md-6">
                <input type="number" id="updateId" class="form-control" placeholder="ID для зміни">
            </div>
            <div class="col-md-6">
                <input type="text" id="newRole" class="form-control" placeholder="Нова роль">
            </div>
            <div class="col-12 mt-2">
                <button id="updateBtn" class="btn btn-primary w-50">Оновити роль</button>
            </div>
        </div>
    </div>

    <p class="info-text">
        Результати дій відображаються у <b>консолі браузера (F12)</b>
    </p>
</div>

<script src="script.js"></script>
</body>
</html>
