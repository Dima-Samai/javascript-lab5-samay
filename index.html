<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Practical 5: User Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 50px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .main-card { max-width: 700px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .btn-custom { border-radius: 10px; font-weight: 600; padding: 10px 20px; }
        .console-hint { background: #e9ecef; padding: 10px; border-radius: 8px; font-size: 0.85rem; color: #495057; margin-top: 25px; }
        hr { margin: 30px 0; opacity: 0.1; }
    </style>
</head>
<body>

<div class="container">
    <div class="main-card">
        <h2 class="text-center mb-4">Керування користувачами</h2>
        
        <div class="row g-3">
            <div class="col-md-6">
                <label class="form-label">Ім'я</label>
                <input type="text" id="userName" class="form-control" placeholder="Наприклад: Олександр">
            </div>
            <div class="col-md-6">
                <label class="form-label">Роль</label>
                <select id="userRole" class="form-select">
                    <option value="User">User</option>
                    <option value="Editor">Editor</option>
                    <option value="Admin">Admin</option>
                </select>
            </div>
            <div class="col-12">
                <button id="addBtn" class="btn btn-success btn-custom w-100">Створити користувача</button>
            </div>
        </div>

        <hr>

        <div class="row g-3">
            <div class="col-md-4">
                <label class="form-label">ID користувача</label>
                <input type="number" id="updateId" class="form-control" placeholder="ID">
            </div>
            <div class="col-md-8">
                <label class="form-label">Нова роль</label>
                <select id="newRole" class="form-select">
                    <option value="User">User</option>
                    <option value="Editor">Editor</option>
                    <option value="Admin">Admin</option>
                    <option value="Designer">Designer</option>
                </select>
            </div>
            <div class="col-12">
                <button id="updateBtn" class="btn btn-primary btn-custom w-100">Оновити роль</button>
            </div>
        </div>

        <div class="console-hint text-center">
            💡 Результати дій та <b>Unit-тести</b> дивіться в консолі (F12)
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
