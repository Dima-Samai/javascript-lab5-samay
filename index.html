<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>User Management System</title>
    <style>
        body { font-family: sans-serif; padding: 20px; line-height: 1.6; }
        .controls { background: #f4f4f4; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        input { padding: 8px; margin-right: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        button:hover { background: #218838; }
        .info { color: #666; font-size: 0.9em; }
    </style>
</head>
<body>

    <h2>Керування користувачами</h2>
    
    <div class="controls">
        <input type="text" id="userName" placeholder="Ім'я користувача">
        <input type="text" id="userRole" placeholder="Роль (напр. Admin)">
        <button onclick="handleCreate()">Додати</button>
    </div>

    <div class="controls" style="background: #e9ecef;">
        <input type="number" id="updateId" placeholder="ID для зміни">
        <input type="text" id="newRole" placeholder="Нова роль">
        <button onclick="handleUpdate()" style="background: #007bff;">Оновити роль</button>
    </div>

    <p class="info">Результати дій відображаються у <b>консолі браузера (F12)</b></p>

    <script src="script.js"></script>
</body>
</html>
